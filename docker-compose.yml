services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - db-data:/app/data/db
      - sample-data:/app/data/sample_json_20260301
    environment:
      - PORT=8080
      - DATABASE_PATH=/app/data/db/narratorai.db
      - DATA_DIR=/app/data/sample_json_20260301
      - JWT_SECRET=${JWT_SECRET:-nexus-change-me-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  sample-data:
